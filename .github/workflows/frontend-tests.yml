name: Frontend Tests - React & Node

on:
  push:
    branches: [ main, Samanta, Rafi, dev ]
    paths:
      - 'client/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/frontend-tests.yml'
  pull_request:
    branches: [ main, Samanta, Rafi, dev ]
    paths:
      - 'client/**'
      - 'package.json'

jobs:
  install-and-lint:
    runs-on: ubuntu-latest
    name: Install Dependencies & Lint

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: client/package-lock.json

    - name: Install dependencies
      working-directory: ./client
      run: npm ci

    - name: Run ESLint
      working-directory: ./client
      run: npm run lint || true
      continue-on-error: true

  build:
    runs-on: ubuntu-latest
    name: Build React App
    needs: install-and-lint

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: client/package-lock.json

    - name: Install dependencies
      working-directory: ./client
      run: npm ci

    - name: Build application
      working-directory: ./client
      run: npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: client-build
        path: client/dist
        retention-days: 1

  e2e-tests:
    runs-on: ubuntu-latest
    name: E2E Tests - Playwright
    needs: build
    if: always()

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: client/package-lock.json

    - name: Install dependencies
      working-directory: ./client
      run: npm ci

    - name: Check if test files exist
      id: test-files
      working-directory: ./client
      run: |
        if [ -f "playwright.config.js" ] || [ -d "tests" ]; then
          echo "has-tests=true" >> $GITHUB_OUTPUT
        else
          echo "has-tests=false" >> $GITHUB_OUTPUT
        fi

    - name: Install Playwright browsers
      if: steps.test-files.outputs.has-tests == 'true'
      working-directory: ./client
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      if: steps.test-files.outputs.has-tests == 'true'
      working-directory: ./client
      run: npm run test:e2e
      continue-on-error: true

    - name: Skip E2E tests (no test files)
      if: steps.test-files.outputs.has-tests == 'false'
      run: echo "ℹ️ No Playwright tests configured. Skipping E2E tests."

    - name: Upload Playwright report
      uses: actions/upload-artifact@v3
      if: always() && steps.test-files.outputs.has-tests == 'true'
      with:
        name: playwright-report
        path: client/playwright-report/
        retention-days: 30
