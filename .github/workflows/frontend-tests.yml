name: Frontend Tests - React & Node

on:
  push:
    branches: [ main, Samanta, Rafi, dev ]
    paths:
      - 'client/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/frontend-tests.yml'
  pull_request:
    branches: [ main, Samanta, Rafi, dev ]
    paths:
      - 'client/**'
      - 'package.json'

jobs:
  install-and-lint:
    runs-on: ubuntu-latest
    name: Install Dependencies & Lint

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npx eslint client/src --format compact --max-warnings 5
      continue-on-error: true

  build:
    runs-on: ubuntu-latest
    name: Build React App
    needs: install-and-lint

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build
      working-directory: ./client

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: client-build
        path: client/dist
        retention-days: 1

  e2e-tests:
    runs-on: ubuntu-latest
    name: E2E Tests - Playwright
    needs: build
    if: always()

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npm run test:e2e
      continue-on-error: true

    - name: Upload Playwright report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
